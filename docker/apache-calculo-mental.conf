# ──────────────────────────────────────────────────────────────────────────────
# Apache VirtualHost – Concurso de Cálculo Mental
#
# Copia este archivo a: /etc/apache2/sites-available/calculo-mental.conf
# Luego actívalo con:
#   sudo a2ensite calculo-mental.conf
#   sudo a2enmod proxy proxy_http headers rewrite ssl
#   sudo systemctl reload apache2
#
# Reemplaza en este archivo:
#   TU_DOMINIO.COM           →  tu dominio real (ej. calculo.miescuela.com)
#   /ruta/al/cert/fullchain  →  ruta real a tu certificado SSL
#   /ruta/al/cert/privkey    →  ruta real a tu clave privada SSL
#   4201                     →  coincide con WEB_PORT en .env.vps
# ──────────────────────────────────────────────────────────────────────────────

# ── HTTP → redirige a HTTPS ──────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName TU_DOMINIO.COM
    Redirect permanent / https://TU_DOMINIO.COM/
</VirtualHost>

# ── HTTPS con proxy al contenedor web ────────────────────────────────────────
<VirtualHost *:443>
    ServerName TU_DOMINIO.COM

    # Certificados SSL
    SSLEngine on
    SSLCertificateFile    /ruta/al/cert/fullchain.pem
    SSLCertificateKeyFile /ruta/al/cert/privkey.pem

    # Cabeceras de seguridad
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Frame-Options           "SAMEORIGIN"
    Header always set X-Content-Type-Options    "nosniff"

    # Proxy hacia el contenedor web (nginx interno)
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port  "443"

    ProxyPass        / http://127.0.0.1:4201/
    ProxyPassReverse / http://127.0.0.1:4201/

    # Soporte WebSocket (por si acaso)
    RewriteEngine on
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade  [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:4201/$1" [P,L]

    ErrorLog  ${APACHE_LOG_DIR}/calculo-mental_error.log
    CustomLog ${APACHE_LOG_DIR}/calculo-mental_access.log combined
</VirtualHost>

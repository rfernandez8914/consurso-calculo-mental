server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy: redirige /api/* al contenedor del API ──────────
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Reenviar el proto que Apache nos pasa (siempre "https" en VPS)
        # $scheme aquí sería "http" porque nginx recibe HTTP de Apache — NO usar.
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;

        # Reenvía las cookies de sesión
        proxy_pass_header  Set-Cookie;

        # Sin buffer para respuestas grandes del API
        proxy_buffering    off;
    }

    # ── Gzip para mejor rendimiento ───────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # ── Assets con hash (caché inmutable 1 año) ───────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA: rutas no encontradas → index.html ────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cabeceras de seguridad ────────────────────────────────
    add_header X-Frame-Options    "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection   "1; mode=block";
}

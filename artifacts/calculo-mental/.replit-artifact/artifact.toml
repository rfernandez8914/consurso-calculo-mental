kind = "web"
previewPath = "/"
title = "Concurso de Cálculo Mental"
version = "1.0.0"
id = "artifacts/calculo-mental"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20250

[services.development]
run = "pnpm --filter @workspace/calculo-mental run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/calculo-mental", "run", "build" ]
publicDir = "artifacts/calculo-mental/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20250"
BASE_PATH = "/"
